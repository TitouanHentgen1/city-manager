int get_severity_threshold(const char *dir_path) {
    char cfg_path[512];
    sprintf(cfg_path, "%s/district.cfg", dir_path);
    
    FILE *f = fopen(cfg_path, "r");
    if (!f) return 0;

    int threshold = 0;
    fscanf(f, "threshold=%d", &threshold);
    fclose(f);
    return threshold;
}
void process_district(const char *dir_name, Condition *conds, int num_conds) {
    char data_path[512];
    sprintf(data_path, "%s/reports.dat", dir_name);

    int threshold = get_severity_threshold(dir_name);
    int fd = open(data_path, O_RDONLY);
    if (fd == -1) return;

    Report rec;
    while (read(fd, &rec, sizeof(Report)) == sizeof(Report)) {
        int matches = 1;

        // 1. Verificăm condițiile trimise ca argumente (ex: category:eq:road)
        for (int i = 0; i < num_conds; i++) {
            if (!match_condition(&rec, &conds[i])) {
                matches = 0;
                break;
            }
        }

        // 2. Verificăm dacă este o alertă critică (peste pragul din district.cfg)
        if (matches && rec.severity >= threshold) {
            printf("[ALERT - %s] ID: %d | Cat: %s | Sev: %d | Insp: %s\n", 
                    dir_name, rec.id, rec.category, rec.severity, rec.inspector);
        }
    }
    close(fd);
}

